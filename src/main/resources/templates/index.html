<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🎵 Musik Verwaltung</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(30,215,96,0.15) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(30,215,96,0.08) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            pointer-events: none;
        }
        .container {
            text-align: center;
            padding: 60px 80px;
            animation: fadeUp 0.6s ease forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { width: 56px; height: 56px; margin: 0 auto 24px; }
        .logo svg { width: 100%; height: 100%; }
        h1 {
            font-size: 52px;
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #B3B3B3;
            margin-bottom: 48px;
        }
        p span { color: #1ED760; font-weight: 600; }
        a.button {
            display: inline-block;
            padding: 16px 48px;
            font-size: 15px;
            font-weight: 700;
            color: #000000;
            text-decoration: none;
            border-radius: 500px;
            background: #1ED760;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        a.button:hover {
            transform: scale(1.04);
            background: #1fdf64;
            box-shadow: 0 8px 30px rgba(30,215,96,0.4);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="#1ED760" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
    </div>
    <h1>Musik Verwaltung</h1>
    <p>Heute: <span th:text="${today}">05. März 2026</span></p>
    <a class="button" href="/genre/manage">Genres verwalten</a>
</div>
</body>
</html>

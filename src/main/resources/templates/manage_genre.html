<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>🎵 Genre Verwaltung</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #121212;
            color: #FFFFFF;
            min-height: 100vh;
            padding: 48px 32px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1000px;
            margin: 0 auto 40px;
        }
        .logo-row { display: flex; align-items: center; gap: 12px; }
        .logo-row svg { width: 32px; height: 32px; }
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .addbtn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: #1ED760;
            color: #000;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 500px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .addbtn:hover {
            background: #1fdf64;
            transform: scale(1.04);
            box-shadow: 0 6px 20px rgba(30,215,96,0.35);
        }
        .table-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            background: #181818;
            border-radius: 12px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr { border-bottom: 1px solid #282828; }
        th {
            padding: 14px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #B3B3B3;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        td {
            padding: 14px 20px;
            font-size: 15px;
            color: #FFFFFF;
            border-bottom: 1px solid #282828;
        }
        tbody tr { transition: background 0.15s ease; }
        tbody tr:hover { background: #282828; }
        tbody tr:last-child td { border-bottom: none; }
        .id-col { color: #B3B3B3; font-size: 14px; }
        .popularity-bar { display: flex; align-items: center; gap: 10px; }
        .bar-bg { width: 80px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .bar-fill { height: 100%; background: #1ED760; border-radius: 2px; }
        .actions { display: flex; gap: 8px; }
        .edit, .delete {
            padding: 7px 16px;
            border: none;
            border-radius: 500px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s;
        }
        .edit { background: transparent; color: #FFFFFF; border: 1px solid #535353; }
        .edit:hover { border-color: #FFFFFF; transform: scale(1.04); }
        .delete { background: transparent; color: #F15E6C; border: 1px solid #F15E6C; }
        .delete:hover { background: rgba(241,94,108,0.1); transform: scale(1.04); }
        a { text-decoration: none; }
    </style>
</head>
<body>
<header>
    <div class="logo-row">
        <svg viewBox="0 0 24 24" fill="#1ED760"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
        <h1>Musik Genre Verwaltung</h1>
    </div>
    <a class="addbtn" href="/genre/add">+ Neues Genre</a>
</header>
<div class="table-wrapper">
    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Popularity</th>
            <th>Avg. Tempo</th>
            <th>Ursprung</th>
            <th>Listeners/Monat</th>
            <th>Aktionen</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="g : ${genres}">
            <td class="id-col" th:text="${g.id}"></td>
            <td th:text="${g.name}"></td>
            <td>
                <div class="popularity-bar">
                    <div class="bar-bg">
                        <div class="bar-fill" th:style="'width:' + ${g.popularity} + '%'"></div>
                    </div>
                    <span th:text="${g.popularity}"></span>
                </div>
            </td>
            <td th:text="${g.averageTempo}"></td>
            <td th:text="${g.ursprung}"></td>
            <td th:text="${g.listenersProMonat}"></td>
            <td>
                <div class="actions">
                    <a th:href="@{/genre/edit/{id}(id=${g.id})}"><button class="edit">Bearbeiten</button></a>
                    <a th:href="@{/genre/delete/{id}(id=${g.id})}"><button class="delete">Löschen</button></a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
